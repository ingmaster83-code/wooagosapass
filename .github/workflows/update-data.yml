name: "데이터 업데이트 & 페이지 생성"

on:
  schedule:
    # 매일 오전 2시 KST (= UTC 17:00)
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      phase:
        description: "실행 단계 (all / phase1 / phase2)"
        required: false
        default: "all"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: Phase 1 — 벌크 데이터 수집
        if: ${{ github.event.inputs.phase != 'phase2' }}
        env:
          API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python scripts/fetch_data.py --phase1

      - name: Phase 2 — 종목별 상세 데이터 (배치)
        if: ${{ github.event.inputs.phase != 'phase1' }}
        env:
          API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: python scripts/fetch_data.py --phase2

      - name: 페이지 생성
        run: python scripts/generate_pages.py

      - name: 사이트맵 생성
        run: python scripts/generate_sitemap.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/exam/ docs/data/
          git diff --cached --quiet || git commit -m "chore: 데이터 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
